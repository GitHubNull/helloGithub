name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output_name="github-fast-dns-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -ldflags "-s -w" -o "bin/${output_name}" src/cmd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-fast-dns-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/github-fast-dns-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          tag=${GITHUB_REF#refs/tags/}
          echo "version=${tag}" >> "$GITHUB_OUTPUT"

      - name: Read CHANGELOG
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          path: doc/CHANGELOG.md
          version: ${{ steps.get_version.outputs.version }}
        continue-on-error: true

      - name: Generate fallback release notes
        id: fallback_notes
        if: steps.changelog.outcome == 'failure'
        run: |
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "## What's Changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:'- %s' >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 HEAD^)...${{ steps.get_version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changes || steps.fallback_notes.outputs.body }}
          files: bin/github-fast-dns-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
