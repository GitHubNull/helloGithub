dns:
  listen_addr: "127.0.0.1"
  listen_port: 53

scanner:
  interval: 5m
  timeout: 3s
  concurrency: 100
  test_port: 443
  max_latency: 5s

logger:
  level: info
  format: json
  output_path: tmp/logs/app.log
  max_size_mb: 10
  max_backups: 5
  max_age_days: 30

domains:
  - github.com
  - www.github.com
  - api.github.com
  - raw.githubusercontent.com
  - gist.github.com
  - github.io
  - avatars.githubusercontent.com
  - camo.githubusercontent.com
  - cloud.githubusercontent.com
  - gist.githubusercontent.com
  - user-images.githubusercontent.com
  - docs.github.com
  - githubusercontent.com
  - objects.githubusercontent.com
  - media.githubusercontent.com
  - codeload.github.com
  - github.githubassets.com
  - githubstatus.com
  - support.github.com
  - github.dev

upstream:
  - 8.8.8.8:53
  - 8.8.4.4:53
  - 114.114.114.114:53
